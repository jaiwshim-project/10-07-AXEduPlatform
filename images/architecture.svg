<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" font-family="'Noto Sans KR', 'Inter', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EFF2F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGrad)" rx="16"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="64" rx="16" fill="url(#titleGrad)"/>
  <rect x="0" y="48" width="900" height="16" fill="url(#titleGrad)"/>
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="white" letter-spacing="0.5">AX교육플랫폼 시스템 아키텍처 · 7-Layer Architecture</text>

  <!-- Layer definitions: y, height, color, title, subtitle, icons -->

  <!-- Layer 1: 사용자 레이어 -->
  <g filter="url(#shadow)">
    <rect x="40" y="82" width="820" height="62" rx="12" fill="#FF6B35"/>
    <rect x="40" y="82" width="6" height="62" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="106" font-size="11" font-weight="700" fill="white" opacity="0.85" letter-spacing="1">LAYER 1</text>
  <text x="80" y="124" font-size="15" font-weight="700" fill="white">사용자 레이어</text>
  <text x="270" y="118" font-size="12" fill="rgba(255,255,255,0.85)">Web Browser  ·  Mobile App  ·  PWA</text>
  <!-- Icons right side -->
  <text x="760" y="119" font-size="22" text-anchor="middle">🌐</text>
  <text x="800" y="119" font-size="22" text-anchor="middle">📱</text>
  <text x="840" y="119" font-size="22" text-anchor="middle">💻</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="144" x2="450" y2="155" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 2: CDN/Vercel Edge -->
  <g filter="url(#shadow)">
    <rect x="40" y="157" width="820" height="62" rx="12" fill="#00C896"/>
    <rect x="40" y="157" width="6" height="62" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="181" font-size="11" font-weight="700" fill="white" opacity="0.85" letter-spacing="1">LAYER 2</text>
  <text x="80" y="199" font-size="15" font-weight="700" fill="white">CDN / Vercel Edge Layer</text>
  <text x="310" y="193" font-size="12" fill="rgba(255,255,255,0.85)">Global CDN  ·  Edge Functions  ·  캐싱 &amp; 최적화  ·  HTTPS/SSL</text>
  <text x="760" y="194" font-size="22" text-anchor="middle">⚡</text>
  <text x="800" y="194" font-size="22" text-anchor="middle">🌍</text>
  <text x="840" y="194" font-size="22" text-anchor="middle">🔒</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="219" x2="450" y2="230" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 3: 정적 파일 -->
  <g filter="url(#shadow)">
    <rect x="40" y="232" width="820" height="62" rx="12" fill="#0A2540"/>
    <rect x="40" y="232" width="6" height="62" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="256" font-size="11" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="1">LAYER 3</text>
  <text x="80" y="274" font-size="15" font-weight="700" fill="white">정적 파일 레이어</text>
  <text x="268" y="268" font-size="12" fill="rgba(255,255,255,0.85)">HTML5  ·  CSS3 (Variables)  ·  Vanilla JS  ·  SVG Assets  ·  Web Fonts</text>
  <text x="760" y="269" font-size="22" text-anchor="middle">📄</text>
  <text x="800" y="269" font-size="22" text-anchor="middle">🎨</text>
  <text x="840" y="269" font-size="22" text-anchor="middle">⚙️</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="294" x2="450" y2="305" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 4: API 레이어 -->
  <g filter="url(#shadow)">
    <rect x="40" y="307" width="820" height="62" rx="12" fill="#FF6B35"/>
    <rect x="40" y="307" width="6" height="62" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="331" font-size="11" font-weight="700" fill="white" opacity="0.85" letter-spacing="1">LAYER 4</text>
  <text x="80" y="349" font-size="15" font-weight="700" fill="white">API 레이어</text>
  <text x="242" y="343" font-size="12" fill="rgba(255,255,255,0.85)">Gemini API  ·  Supabase REST API  ·  Edge Functions  ·  Rate Limiting</text>
  <text x="760" y="344" font-size="22" text-anchor="middle">🔌</text>
  <text x="800" y="344" font-size="22" text-anchor="middle">🚀</text>
  <text x="840" y="344" font-size="22" text-anchor="middle">🛡️</text>

  <!-- Arrow 4→5 -->
  <line x1="450" y1="369" x2="450" y2="380" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 5: 데이터 레이어 -->
  <g filter="url(#shadow)">
    <rect x="40" y="382" width="820" height="62" rx="12" fill="#00C896"/>
    <rect x="40" y="382" width="6" height="62" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="406" font-size="11" font-weight="700" fill="white" opacity="0.85" letter-spacing="1">LAYER 5</text>
  <text x="80" y="424" font-size="15" font-weight="700" fill="white">데이터 레이어</text>
  <text x="262" y="418" font-size="12" fill="rgba(255,255,255,0.85)">PostgreSQL  ·  Supabase Storage  ·  pgvector (임베딩)  ·  Realtime</text>
  <text x="760" y="419" font-size="22" text-anchor="middle">🗄️</text>
  <text x="800" y="419" font-size="22" text-anchor="middle">📦</text>
  <text x="840" y="419" font-size="22" text-anchor="middle">⚡</text>

  <!-- Arrow 5→6 -->
  <line x1="450" y1="444" x2="450" y2="455" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 6: 인증 레이어 -->
  <g filter="url(#shadow)">
    <rect x="40" y="457" width="820" height="62" rx="12" fill="#0A2540"/>
    <rect x="40" y="457" width="6" height="62" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="481" font-size="11" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="1">LAYER 6</text>
  <text x="80" y="499" font-size="15" font-weight="700" fill="white">인증 레이어</text>
  <text x="248" y="493" font-size="12" fill="rgba(255,255,255,0.85)">Supabase Auth  ·  Google OAuth  ·  JWT Token  ·  RLS (Row Level Security)</text>
  <text x="760" y="494" font-size="22" text-anchor="middle">🔐</text>
  <text x="800" y="494" font-size="22" text-anchor="middle">👤</text>
  <text x="840" y="494" font-size="22" text-anchor="middle">🎫</text>

  <!-- Arrow 6→7 -->
  <line x1="450" y1="519" x2="450" y2="530" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 7: AI 레이어 -->
  <g filter="url(#shadow)">
    <rect x="40" y="532" width="820" height="52" rx="12" fill="#FF6B35"/>
    <rect x="40" y="532" width="6" height="52" rx="3" fill="rgba(255,255,255,0.4)"/>
  </g>
  <text x="80" y="553" font-size="11" font-weight="700" fill="white" opacity="0.85" letter-spacing="1">LAYER 7</text>
  <text x="80" y="571" font-size="15" font-weight="700" fill="white">AI 레이어</text>
  <text x="232" y="564" font-size="12" fill="rgba(255,255,255,0.85)">Gemini 1.5 Flash  ·  RAG Pipeline  ·  Vector Embeddings  ·  Prompt Engineering</text>
  <text x="760" y="564" font-size="22" text-anchor="middle">🤖</text>
  <text x="800" y="564" font-size="22" text-anchor="middle">🧠</text>
  <text x="840" y="564" font-size="22" text-anchor="middle">✨</text>

  <!-- Footer watermark -->
  <text x="450" y="594" text-anchor="middle" font-size="10" fill="#9CA3AF">AX교육플랫폼 · System Architecture v1.0 · Built with Vibe Coding</text>
</svg>
