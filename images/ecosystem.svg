<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300" font-family="'Noto Sans KR', 'Inter', Arial, sans-serif">
  <defs>
    <linearGradient id="ecoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EFF2F7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e55a27;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C896;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#009e77;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e55a27;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C896;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#009e77;stop-opacity:1"/>
    </linearGradient>
    <filter id="ecoShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CBD5E1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#ecoBg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0A2540" letter-spacing="0.3">AX 인재 양성 파이프라인 · Talent Production Ecosystem</text>
  <line x1="80" y1="42" x2="720" y2="42" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Pipeline track line -->
  <line x1="100" y1="152" x2="700" y2="152" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Stage positions: 100, 220, 340, 460, 580, 700 (node centers at 100,220,340,460,580,700? Let me use 5 nodes) -->
  <!-- Nodes at x: 110, 255, 400, 545, 690 -->

  <!-- ① 교육 -->
  <g filter="url(#ecoShadow)">
    <circle cx="110" cy="152" r="56" fill="url(#grad1)"/>
  </g>
  <text x="110" y="140" text-anchor="middle" font-size="26">📚</text>
  <text x="110" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="white">교육</text>
  <text x="110" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Education</text>
  <!-- Sub labels -->
  <text x="110" y="222" text-anchor="middle" font-size="10" fill="#6B7280">강의 · 코스</text>
  <text x="110" y="235" text-anchor="middle" font-size="10" fill="#6B7280">AI 튜터</text>
  <text x="110" y="248" text-anchor="middle" font-size="10" fill="#6B7280">실습 프로젝트</text>

  <!-- Arrow 1→2 -->
  <line x1="168" y1="152" x2="196" y2="152" stroke="#CBD5E1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="182" y="142" text-anchor="middle" font-size="9" fill="#9CA3AF">수료</text>

  <!-- ② 인증 -->
  <g filter="url(#ecoShadow)">
    <circle cx="255" cy="152" r="56" fill="url(#grad2)"/>
  </g>
  <text x="255" y="140" text-anchor="middle" font-size="26">🏆</text>
  <text x="255" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="white">인증</text>
  <text x="255" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Certification</text>
  <text x="255" y="222" text-anchor="middle" font-size="10" fill="#6B7280">AX Practitioner</text>
  <text x="255" y="235" text-anchor="middle" font-size="10" fill="#6B7280">AX Expert</text>
  <text x="255" y="248" text-anchor="middle" font-size="10" fill="#6B7280">디지털 배지</text>

  <!-- Arrow 2→3 -->
  <line x1="313" y1="152" x2="341" y2="152" stroke="#CBD5E1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="327" y="142" text-anchor="middle" font-size="9" fill="#9CA3AF">합류</text>

  <!-- ③ 커뮤니티 -->
  <g filter="url(#ecoShadow)">
    <circle cx="400" cy="152" r="56" fill="url(#grad3)"/>
  </g>
  <text x="400" y="140" text-anchor="middle" font-size="26">🤝</text>
  <text x="400" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="white">커뮤니티</text>
  <text x="400" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">Community</text>
  <text x="400" y="222" text-anchor="middle" font-size="10" fill="#6B7280">스터디 그룹</text>
  <text x="400" y="235" text-anchor="middle" font-size="10" fill="#6B7280">멘토링</text>
  <text x="400" y="248" text-anchor="middle" font-size="10" fill="#6B7280">지식 공유</text>

  <!-- Arrow 3→4 -->
  <line x1="458" y1="152" x2="486" y2="152" stroke="#CBD5E1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="472" y="142" text-anchor="middle" font-size="9" fill="#9CA3AF">참여</text>

  <!-- ④ AX 프로젝트 -->
  <g filter="url(#ecoShadow)">
    <circle cx="545" cy="152" r="56" fill="url(#grad4)"/>
  </g>
  <text x="545" y="140" text-anchor="middle" font-size="26">🚀</text>
  <text x="545" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="white">AX프로젝트</text>
  <text x="545" y="174" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">AX Projects</text>
  <text x="545" y="222" text-anchor="middle" font-size="10" fill="#6B7280">실무 프로젝트</text>
  <text x="545" y="235" text-anchor="middle" font-size="10" fill="#6B7280">포트폴리오</text>
  <text x="545" y="248" text-anchor="middle" font-size="10" fill="#6B7280">바이브 코딩</text>

  <!-- Arrow 4→5 -->
  <line x1="603" y1="152" x2="631" y2="152" stroke="#CBD5E1" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="617" y="142" text-anchor="middle" font-size="9" fill="#9CA3AF">연결</text>

  <!-- ⑤ 기업 서비스 -->
  <g filter="url(#ecoShadow)">
    <circle cx="690" cy="152" r="56" fill="url(#grad5)"/>
  </g>
  <text x="690" y="140" text-anchor="middle" font-size="26">🏢</text>
  <text x="690" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="white">기업서비스</text>
  <text x="690" y="174" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Enterprise</text>
  <text x="690" y="222" text-anchor="middle" font-size="10" fill="#6B7280">AX 컨설팅</text>
  <text x="690" y="235" text-anchor="middle" font-size="10" fill="#6B7280">인재 매칭</text>
  <text x="690" y="248" text-anchor="middle" font-size="10" fill="#6B7280">기업 교육</text>

  <!-- Step numbers -->
  <circle cx="110" cy="82" r="12" fill="white" stroke="#FF6B35" stroke-width="2"/>
  <text x="110" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#FF6B35">1</text>
  <circle cx="255" cy="82" r="12" fill="white" stroke="#00C896" stroke-width="2"/>
  <text x="255" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#00C896">2</text>
  <circle cx="400" cy="82" r="12" fill="white" stroke="#0A2540" stroke-width="2"/>
  <text x="400" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#0A2540">3</text>
  <circle cx="545" cy="82" r="12" fill="white" stroke="#FF6B35" stroke-width="2"/>
  <text x="545" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#FF6B35">4</text>
  <circle cx="690" cy="82" r="12" fill="white" stroke="#00C896" stroke-width="2"/>
  <text x="690" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#00C896">5</text>

  <!-- Footer -->
  <text x="400" y="292" text-anchor="middle" font-size="10" fill="#9CA3AF">AX교육플랫폼 · AI Transformation Talent Ecosystem</text>
</svg>
