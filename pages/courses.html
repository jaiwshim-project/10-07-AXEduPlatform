    .cat-tab.active { background: #0A2540; color: white; border-color: #0A2540; }

    /* ── Sort + Results ── */
    .sort-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .results-info { font-size: 0.9rem; color: var(--color-text-muted); }
    .results-info strong { color: var(--color-text); font-weight: 700; }
    .sort-select {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--color-border);
      background: var(--color-white);
      font-family: var(--font-korean);
      font-size: 0.875rem;
      color: var(--color-text);
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: #0A2540; }

    /* ── Course Grid ── */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 640px) { .courses-grid { grid-template-columns: 1fr; } }

    /* ── Course Card ── */
    .course-card {
      background: var(--color-white);
      border-radius: 16px;
      border: 1px solid var(--color-border);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      cursor: pointer;

    .course-card:hover {
      transform: translateY(-5px);

      border-color: #FF6B35;

/* ── Stars ── */
function renderStars(rating) {
  const full = Math.floor(rating);
  const half = (rating % 1) >= 0.5;
  let s = '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
  return `<span class="stars">${s}</span>`;
}

/* ── Price ── */
function fmtPrice(price) {
  if (price === 0) return { text: '무료', cls: 'free' };
  return { text: `₩${price.toLocaleString('ko-KR')}`, cls: '' };
}

      ${c.emoji}
      <div class="thumb-badges">
        <span class="badge ${catCls}">${c.category}</span>
        <span class="badge ${c.price === 0 ? 'badge-free' : 'badge-paid'}">${c.price === 0 ? '무료' : '유료'}</span>
      </div>
    </div>
    <div class="course-body">
      <div class="course-title">${c.title}</div>
      <div class="course-instructor">👤 ${c.instructor}</div>
      <div class="rating-row">
        ${renderStars(c.rating)}
        <span class="rating-score">${c.rating}</span>
        <span class="review-count">(${c.reviews.toLocaleString('ko-KR')}개 리뷰)</span>
      </div>
      <div class="meta-row">
        <span>⏱ ${c.hours}시간</span>
        <span>👥 ${c.students.toLocaleString('ko-KR')}명</span>
        <span class="badge level-${c.level}" style="font-size:0.72rem;">${c.level}</span>
      </div>
      <div class="course-footer">
        <span class="price-tag ${p.cls}">${p.text}</span>
        <a href="course-detail.html?id=${c.id}" class="enroll-btn" onclick="event.stopPropagation()">수강하기</a>
      </div>
    </div>
  </div>`;
}

/* ── Apply filters + sort ── */
function applyFilters() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const sort  = document.getElementById('sortSelect').value;

  let list = COURSES.filter(c => {
    const matchCat = currentCategory === '전체' || c.category === currentCategory;
    const matchQ   = !query || c.title.toLowerCase().includes(query) || c.instructor.toLowerCase().includes(query);
    return matchCat && matchQ;
  });

  if (sort === 'popular') list = [...list].sort((a,b) => b.students - a.students);
  else if (sort === 'rating') list = [...list].sort((a,b) => b.rating - a.rating);
  else if (sort === 'level')  list = [...list].sort((a,b) => LEVEL_ORDER[a.level] - LEVEL_ORDER[b.level]);

  const total = list.length;
  document.getElementById('resultsInfo').innerHTML = `총 <strong>${total}</strong>개 강의`;

  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = 1;

  const slice = list.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);
  const grid = document.getElementById('coursesGrid');
  const noRes = document.getElementById('noResults');

  if (slice.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
  } else {
    noRes.style.display = 'none';
    grid.innerHTML = slice.map(cardHTML).join('');
  }

  renderPagination(totalPages);
}

/* ── Pagination ── */
function renderPagination(total) {
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1)
    html += `<button class="page-btn page-btn-arrow" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= total; i++)
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (currentPage < total)
    html += `<button class="page-btn page-btn-arrow" onclick="goPage(${currentPage+1})">›</button>`;
  el.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  applyFilters();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Category tab wiring ── */
document.getElementById('categoryTabs').addEventListener('click', e => {
  const btn = e.target.closest('.cat-tab');
  if (!btn) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.cat;
  currentPage = 1;
  applyFilters();
});

/* ── Init ── */
document.addEventListener('DOMContentLoaded', applyFilters);
</script>
