      text-align: center;
    }

    .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
    .hero p { opacity: 0.8; font-size: 1.05rem; margin-bottom: 32px; max-width: 560px; margin-left: auto; margin-right: auto; }

    .search-filter-bar {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .search-filter-bar input {
      flex: 1;
      min-width: 200px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 1rem;
      font-family: var(--font-korean);
    }

    .search-filter-bar select {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.95rem;
      font-family: var(--font-korean);
      background: rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
    }

    .search-filter-bar select option { color: var(--color-text); background: white; }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 32px;
      flex-wrap: wrap;
    }

    .hero-stat { text-align: center; }
    .hero-stat-value { font-size: 2rem; font-weight: 800; color: #FF6B35; }
    .hero-stat-label { font-size: 0.8rem; opacity: 0.7; margin-top: 2px; }

    .experts-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .experts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .expert-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .expert-card {
      background: white;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      padding: 24px;
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .expert-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-accent), var(--color-green));
      transform: scaleX(0);
      transition: transform var(--transition);
    }

    .expert-card:hover::before { transform: scaleX(1); }
    .expert-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }

    .expert-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .expert-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .expert-basic { flex: 1; }
    .expert-name { font-size: 1.1rem; font-weight: 800; color: var(--color-primary); margin-bottom: 2px; }
    .expert-title { font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 8px; }

    .expert-level-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .level-architect { background: linear-gradient(135deg, #FF6B35, #e55a27); color: white; }
    .level-expert { background: linear-gradient(135deg, #00C896, #00a07a); color: white; }
    .level-practitioner { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; }

    .expert-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .expert-stats {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-bottom: 14px;
    }

    .expert-stat { display: flex; align-items: center; gap: 4px; }

    .expert-desc {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expert-card-footer {
      display: flex;
      gap: 8px;
    }

    .profile-modal-header {

      margin: -32px -32px 24px;

      align-items: flex-start;
      margin-bottom: 16px;
    }

      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      flex-shrink: 0;
      border: 3px solid rgba(255,255,255,0.3);

    .profile-modal-title { opacity: 0.8; margin-bottom: 10px; }
    .profile-modal-badges { display: flex; gap: 8px; flex-wrap: wrap; }

      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: var(--radius-full);
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .profile-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--color-border);
    }

    .skill-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }

    .upload-area {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--color-accent);
      background: rgba(255,107,53,0.04);

    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.95rem; color: var(--color-text-muted); }
    .upload-hint { font-size: 0.8rem; color: var(--color-text-muted); margin-top: 4px; }

    /* Filter pills */
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-pill {
      padding: 6px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: white;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-korean);

    .filter-pill:hover { border-color: var(--color-accent); color: var(--color-accent); }
    .filter-pill.active { background: var(--color-accent); color: white; border-color: var(--color-accent); }

</head>

let currentExperts = [...EXPERTS];
let activeSkillFilter = '';

/* =====================
   Render
   ===================== */
function renderExperts(experts) {
  const grid = document.getElementById('expertGrid');
  document.getElementById('resultCount').textContent = `총 ${experts.length}명의 전문가`;

  if (!experts.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;padding:60px;text-align:center;"><div style="font-size:3rem;margin-bottom:16px;">🔍</div><div style="font-size:1.1rem;font-weight:700;">검색 결과가 없습니다</div></div>';
    return;
  }

  grid.innerHTML = experts.map(e => `
    <div class="expert-card" onclick="openProfile(${e.id})">
      <div class="expert-card-top">
        <div class="expert-avatar" style="background:${e.color}">${e.initial}</div>
        <div class="expert-basic">
          <div class="expert-name">${e.name}</div>
          <div class="expert-title">${e.title}</div>
          <span class="expert-level-badge ${e.levelClass}">
            ${e.level === 'AX Architect' ? '🏆' : e.level === 'AX Expert' ? '⭐' : '🎯'} ${e.level}
          </span>
        </div>
      </div>

      <div class="expert-skills">
        ${e.skills.slice(0,4).map(s => `<span class="badge badge-primary">${s}</span>`).join('')}
        ${e.skills.length > 4 ? `<span class="badge badge-gray">+${e.skills.length-4}</span>` : ''}
      </div>

      <div class="expert-stats">
        <div class="expert-stat">⭐ ${e.rating}</div>
        <div class="expert-stat">🚀 프로젝트 ${e.projects}개</div>
        <div class="expert-stat">👥 멘티 ${e.mentees}명</div>
      </div>

      <div class="expert-desc">${e.desc}</div>

      <div class="expert-card-footer">
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation();openProfile(${e.id})">
          프로필 보기
        </button>
        <span class="badge ${e.available ? 'badge-green' : 'badge-gray'}" style="flex-shrink:0;">
          ${e.available ? '✅ 활동 가능' : '⏸ 일시 중단'}
        </span>
      </div>
    </div>
  `).join('');
}

/* =====================
   Profile Modal
   ===================== */
function openProfile(id) {
  const e = EXPERTS.find(x => x.id === id);
  if (!e) return;

  document.getElementById('profileHeader').style.background =
    `linear-gradient(135deg, ${e.color}, ${e.color}cc)`;

  document.getElementById('profileAvatar').style.background = e.color;
  document.getElementById('profileAvatar').textContent = e.initial;
  document.getElementById('profileName').textContent = e.name;
  document.getElementById('profileTitle').textContent = e.title;

  document.getElementById('profileBadges').innerHTML = `
    <span class="cert-badge">${e.level === 'AX Architect' ? '🏆' : '⭐'} ${e.level}</span>
    <span class="cert-badge">📅 경력 ${e.experience}</span>
    <span class="cert-badge ${e.available ? '' : 'opacity-50'}">${e.available ? '✅ 활동 가능' : '⏸ 중단'}</span>
  `;

  document.getElementById('profileQuickStats').innerHTML = `
    <span>⭐ 평점 ${e.rating}</span>
    <span>🚀 프로젝트 ${e.projects}개</span>
    <span>👥 멘티 ${e.mentees}명</span>
    <span>⏱ 경력 ${e.experience}</span>
  `;

  document.getElementById('profileAbout').textContent = e.about;

  document.getElementById('profileSkills').innerHTML =
    e.skills.map(s => `<span class="badge badge-primary badge-lg">${s}</span>`).join('');

  document.getElementById('profileTimeline').innerHTML = e.timeline.map(t => `
    <div class="timeline-item">
      <div class="timeline-date">${t.date}</div>
      <div class="timeline-title">${t.title}</div>
      <div class="timeline-desc">${t.desc}</div>
    </div>
  `).join('');

  document.getElementById('profileCerts').innerHTML = e.certs.map(c => `
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(10,37,64,0.06);
      border:1px solid var(--color-border);border-radius:8px;padding:8px 14px;font-size:0.875rem;font-weight:600;">
      🏅 ${c}
    </div>
  `).join('');

  document.getElementById('profileModal').classList.add('active');
}

  document.getElementById('profileModal').classList.remove('active');
}

/* =====================
   Filter & Sort
   ===================== */
function filterExperts() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const level = document.getElementById('filterLevel').value;
  const domain = document.getElementById('filterDomain').value;

  let filtered = EXPERTS.filter(e => {
    const matchQuery = !query ||
      e.name.includes(query) ||
      e.title.toLowerCase().includes(query) ||
      e.skills.some(s => s.toLowerCase().includes(query)) ||
      e.desc.toLowerCase().includes(query);
    const matchLevel = !level || e.level === level;
    const matchDomain = !domain || e.domain.includes(domain);
    const matchSkill = !activeSkillFilter || e.skills.some(s => s.includes(activeSkillFilter));
    return matchQuery && matchLevel && matchDomain && matchSkill;
  });

  currentExperts = filtered;
  renderExperts(filtered);
}

function filterBySkill(skill, btn) {
  activeSkillFilter = skill;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  filterExperts();
}

function sortExperts(by) {
  let sorted = [...currentExperts];
  if (by === 'rating') sorted.sort((a,b) => b.rating - a.rating);
  else if (by === 'projects') sorted.sort((a,b) => b.projects - a.projects);
  else sorted.sort((a,b) => a.name.localeCompare(b.name));
  renderExperts(sorted);
}

/* =====================
   File Upload
   ===================== */
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.add('dragover');
}

function handleDragLeave() {
  document.getElementById('uploadArea').classList.remove('dragover');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const maxSize = 10 * 1024 * 1024; // 10MB
  if (file.size > maxSize) {
    Toast.error('파일 크기가 10MB를 초과합니다.');
    return;
  }
  const allowed = ['.pdf','.doc','.docx','.zip'];
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!allowed.includes(ext)) {
    Toast.error('허용된 파일 형식: PDF, DOC, DOCX, ZIP');
    return;
  }

  document.getElementById('uploadStatus').innerHTML =
    `<span style="color:var(--color-green);">✅ ${file.name} (${(file.size/1024).toFixed(1)}KB) 업로드 준비 완료</span>`;
  Toast.success(`${file.name} 파일이 선택되었습니다.`);
}

function openManual() { window.location.href = './manual.html'; }

document.getElementById('profileModal').addEventListener('click', function(e) {
  if (e.target === this) closeProfile();
});
