<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — AX교육플랫폼</title>
  <meta name="description" content="AX교육플랫폼에 로그인하거나 새 계정을 만들어 AI 전환 전문가로의 여정을 시작하세요.">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <script>/* FOUC 방지 */const _t=localStorage.getItem('ax-theme');if(_t)document.documentElement.setAttribute('data-theme',_t);</script>
  <style>
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #f0f4f9 0%, #e8f0f9 100%); display: flex; flex-direction: column; }
    [data-theme="dark"] body { background: linear-gradient(135deg, #0c1828 0%, #0f172a 100%); }

    /* 중앙 폼 컨테이너 */
    .auth-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-box {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid rgba(10,37,64,0.1);
      border-top: 4px solid #FF6B35;
      box-shadow: 0 8px 40px rgba(10,37,64,0.12);
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
    }
    [data-theme="dark"] .auth-box {
      background: #1e293b;
      border-color: rgba(255,255,255,0.08);
      border-top-color: #FF6B35;
    }

    /* 로고 헤더 */
    .auth-logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo-wrap img { height: 44px; width: auto; margin: 0 auto 12px; display: block; }
    .auth-logo-wrap p { font-size: 0.85rem; color: #4B5563; margin: 0; }
    [data-theme="dark"] .auth-logo-wrap p { color: #94a3b8; }

    /* 탭 */
    .auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 2px solid #E5E7EB; }
    [data-theme="dark"] .auth-tabs { border-bottom-color: #334155; }
    .auth-tab { flex: 1; padding: 10px; background: none; border: none; font-weight: 700; font-size: 1rem; color: #4B5563; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
    .auth-tab:hover { color: #374151; }
    .auth-tab.active { color: #FF6B35; border-bottom-color: #FF6B35; }

    /* Google 버튼 */
    .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border: 1.5px solid #E5E7EB; border-radius: 8px; background: white; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 0.95rem; transition: all 0.2s; color: #374151; }
    .google-btn:hover { border-color: #4285f4; background: #f0f4ff; }
    [data-theme="dark"] .google-btn { background: #1e293b; border-color: #334155; color: #e2e8f0; }
    [data-theme="dark"] .google-btn:hover { background: rgba(66,133,244,0.1); border-color: #4285f4; }
    .google-logo { font-weight: 800; font-size: 1rem; }
    .google-logo .g { color: #4285f4; } .google-logo .o1 { color: #EA4335; } .google-logo .o2 { color: #FBBC04; } .google-logo .l { color: #34A853; } .google-logo .e { color: #EA4335; }

    /* Divider */
    .divider-text { text-align: center; color: #4B5563; font-size: 0.85rem; position: relative; margin: 20px 0; }
    .divider-text::before, .divider-text::after { content: ''; position: absolute; top: 50%; width: calc(50% - 28px); height: 1px; background: #E5E7EB; }
    [data-theme="dark"] .divider-text::before,
    [data-theme="dark"] .divider-text::after { background: #334155; }
    .divider-text::before { left: 0; } .divider-text::after { right: 0; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .auth-box { padding: 32px 20px; border-radius: 16px; }
      .auth-tabs .auth-tab { font-size: 0.9rem; padding: 8px; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a href="../index.html" class="logo"><img src="../images/logo.png" alt="AX EDU GROUP"></a>
    <div class="nav-actions">
      <a href="../index.html" class="btn btn-ghost btn-sm">← 홈으로</a>
    </div>
  </div>
</nav>

<div class="auth-center">
  <div class="auth-box">
    <!-- 로고 -->
    <div class="auth-logo-wrap">
      <img src="../images/logo.png" alt="AX EDU GROUP">
      <p>AI 전환 전문가 성장 플랫폼</p>
    </div>
    <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login', this)">로그인</button>
        <button class="auth-tab" onclick="switchTab('signup', this)">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <div id="loginForm">
        <div id="loginError" class="alert alert-error hidden" style="margin-bottom:20px;"></div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com">
        </div>
        <div class="form-group" style="position:relative;">
          <label class="form-label">비밀번호</label>
          <input type="password" id="loginPwd" class="form-input" placeholder="비밀번호를 입력하세요" style="padding-right:44px;">
          <button onclick="togglePwd('loginPwd', this)" style="position:absolute;right:12px;top:36px;background:none;border:none;cursor:pointer;color:#6B7280;">👁</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;color:#6B7280;">
            <input type="checkbox" style="accent-color:#FF6B35;"> 로그인 유지
          </label>
          <a href="#" onclick="resetPassword()" style="font-size:0.875rem;color:#FF6B35;text-decoration:none;">비밀번호 찾기</a>
        </div>
        <button onclick="handleLogin()" class="btn btn-primary btn-block btn-lg" style="margin-bottom:20px;">로그인</button>
        <div class="divider-text">또는</div>
        <button onclick="handleGoogle()" class="google-btn" style="margin-top:16px;">
          <span class="google-logo"><span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="l">g</span><span class="l" style="color:#EA4335;">l</span><span class="e">e</span></span>
          Google 계정으로 로그인
        </button>
        <p style="text-align:center;margin-top:24px;font-size:0.875rem;color:#6B7280;">
          계정이 없으신가요? <a href="#" onclick="switchTabByName('signup')" style="color:#FF6B35;font-weight:700;">회원가입</a>
        </p>
      </div>

      <!-- 회원가입 폼 -->
      <div id="signupForm" class="hidden">
        <div id="signupError" class="alert alert-error hidden" style="margin-bottom:20px;"></div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" id="signupName" class="form-input" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" id="signupEmail" class="form-input" placeholder="your@email.com">
        </div>
        <div class="form-group" style="position:relative;">
          <label class="form-label">비밀번호 (6자 이상)</label>
          <input type="password" id="signupPwd" class="form-input" placeholder="••••••••" style="padding-right:44px;">
          <button onclick="togglePwd('signupPwd', this)" style="position:absolute;right:12px;top:36px;background:none;border:none;cursor:pointer;color:#6B7280;">👁</button>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <input type="password" id="signupPwd2" class="form-input" placeholder="비밀번호 재입력">
        </div>
        <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label class="form-label">소속 (선택)</label>
            <input type="text" id="signupOrg" class="form-input" placeholder="회사/학교명">
          </div>
          <div class="form-group">
            <label class="form-label">경험 수준</label>
            <select id="signupLevel" class="form-select">
              <option value="beginner">입문자</option>
              <option value="intermediate">초급</option>
              <option value="advanced">중급</option>
              <option value="expert">고급</option>
            </select>
          </div>
        </div>
        <div class="form-check" style="margin-bottom:20px;">
          <input type="checkbox" id="agreeTerms">
          <label for="agreeTerms" style="font-size:0.875rem;color:#6B7280;">
            <a href="#" style="color:#FF6B35;">이용약관</a> 및 <a href="#" style="color:#FF6B35;">개인정보처리방침</a>에 동의합니다
          </label>
        </div>
        <button onclick="handleSignup()" class="btn btn-primary btn-block btn-lg" style="margin-bottom:20px;">회원가입</button>
        <div class="divider-text">또는</div>
        <button onclick="handleGoogle()" class="google-btn" style="margin-top:16px;">
          <span class="google-logo"><span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="l">g</span><span class="l" style="color:#EA4335;">l</span><span class="e">e</span></span>
          Google 계정으로 가입
        </button>
        <p style="text-align:center;margin-top:24px;font-size:0.875rem;color:#6B7280;">
          이미 계정이 있나요? <a href="#" onclick="switchTabByName('login')" style="color:#FF6B35;font-weight:700;">로그인</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="../js/components.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script>
  function switchTab(name, btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').classList.toggle('hidden', name !== 'login');
    document.getElementById('signupForm').classList.toggle('hidden', name !== 'signup');
  }
  function switchTabByName(name) {
    const tabs = document.querySelectorAll('.auth-tab');
    const idx = name === 'login' ? 0 : 1;
    switchTab(name, tabs[idx]);
  }
  function togglePwd(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPwd').value;
    const errEl = document.getElementById('loginError');
    if (!email || !pwd) { errEl.textContent='이메일과 비밀번호를 입력해주세요.'; errEl.classList.remove('hidden'); return; }
    try {
      errEl.classList.add('hidden');
      await Auth.signIn(email, pwd);
      Utils.showToast('로그인 성공!', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
  }
  async function handleSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pwd = document.getElementById('signupPwd').value;
    const pwd2 = document.getElementById('signupPwd2').value;
    const errEl = document.getElementById('signupError');
    if (!name||!email||!pwd) { errEl.textContent='모든 필수 항목을 입력해주세요.'; errEl.classList.remove('hidden'); return; }
    if (pwd !== pwd2) { errEl.textContent='비밀번호가 일치하지 않습니다.'; errEl.classList.remove('hidden'); return; }
    if (!document.getElementById('agreeTerms').checked) { errEl.textContent='이용약관에 동의해주세요.'; errEl.classList.remove('hidden'); return; }
    try {
      errEl.classList.add('hidden');
      await Auth.signUp(email, pwd, { name, organization: document.getElementById('signupOrg').value, experience_level: document.getElementById('signupLevel').value });
      Utils.showToast('회원가입 완료! 대시보드로 이동합니다.', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
  }
  async function handleGoogle() {
    try {
      await Auth.signInWithGoogle();
      Utils.showToast('Google 로그인 성공!', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch(e) { Utils.showToast(e.message, 'error'); }
  }
  function resetPassword() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { Utils.showToast('이메일을 먼저 입력해주세요.', 'warning'); return; }
    Utils.showToast('비밀번호 재설정 메일을 발송했습니다.', 'success');
  }
</script>
</body>
</html>
